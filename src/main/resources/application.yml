spring:
  application:
    name: workflow-engine
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DB:workflow1}
      auto-index-creation: ${MONGODB_AUTO_INDEX_CREATION:false}
  security:
    jwt:
      secret: ${JWT_SECRET:workflow-engine-super-secret-key-for-hs512-signing-2026-atlas-backend-auth-token-secure}
      expiration: ${JWT_EXPIRATION_MS:86400000}
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    web:
      cors:
        allowed-origins: "*"
        allowed-methods: GET,POST,OPTIONS
        max-age: 3600

# Orígenes web (Angular) y Flutter web (p. ej. 4500). Set CORS_ALLOWED_ORIGINS para añadir más.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,http://localhost:4500,http://localhost:8090}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.banco.workflow: DEBUG
    io.temporal: INFO
    org.springframework.graphql: DEBUG

# Temporal Configuration
temporal:
  namespace: default
  target: ${TEMPORAL_TARGET:localhost:7233}

workflow:
  ai:
    base-url: ${WORKFLOW_AI_BASE_URL:http://localhost:8090}
